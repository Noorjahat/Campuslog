<!DOCTYPE html>
<html>
<head>
  <title>CampusLog — Admin Panel</title>

  <!-- LOGIN PROTECTION -->
  <script>
    if (sessionStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: #f3f5f9;
      color: #111827;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    body.dark {
      background: #0f172a;
      color: #e5e7eb;
    }
    body.dark .topbar,
    body.dark .sidebar,
    body.dark .card,
    body.dark table,
    body.dark .table-controls {
      background: #111827;
      color: #e5e7eb;
      box-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    tbody tr:hover { background: #e5e7eb; }
    body.dark tbody tr:hover { background: #1e293b !important; }

    .topbar {
      height: 60px;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .layout { display: flex; flex: 1; min-height: 0; }

    .sidebar {
      width: 230px;
      background: white;
      padding-top: 10px;
      box-shadow: 2px 0 6px rgba(0,0,0,0.05);
    }

    .sidebar ul { list-style: none; padding: 0; }
    .sidebar li { padding: 10px 18px; cursor: pointer; }
    .sidebar li:hover,
#settingsSub .sub-item:hover {
  background: #e5e7eb;
  color: #111827;
}
    body.dark .sidebar li:hover,
body.dark #settingsSub .sub-item:hover {
  background: #1e293b;
  color: #ffffff;
}

    .content {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }

    .page { display: none; }
    .page.active { display: block; }

    .table-controls { 
      display: flex;
      gap: 10px; 
      background: #ffffff;
      padding: 10px 12px; 
      border-radius: 10px; 
      margin-bottom: 12px; 
    } 

    body.dark .table-controls{
      background:#111827;
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      background: #ffffff; 
      border-radius: 10px; 
      overflow: hidden; 
    } 

    th, td { 
      padding: 10px 12px; 
      border-bottom: 1px solid #e5e7eb; 
      text-align: left; 
    } 

    th { 
      background: #f3f4f6; 
      font-weight: 600; 
      cursor: pointer;
    }
    
    body.dark th{
      background:#1e293b;
      color:#e5e7eb;
    }


    .card {
      min-width: 200px;
      padding: 22px 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.08);
    }

    /* Search box stylish */
.table-controls input{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #d1d5db;
  background:white;
  color:#111827;
  outline:none;
  width:180px;
}

body.dark .table-controls input{
  border:1px solid #334155;
  background:#0b1220;
  color:#e5e7eb;
}


.table-controls input::placeholder{
  color:#9ca3af;
}

.table-controls input:focus{
  border-color:#60a5fa;
  box-shadow:0 0 0 1px #60a5fa;
}


/* Export button */
.exportBtn{
  background:#2563eb;
  color:white;
}

.exportBtn:hover{
  background:#1d4ed8;
}

/* Clear button */
.clearBtn{
  background:#e5e7eb;
  color:#111827;
}

.clearBtn:hover{
  background:#d1d5db;
}

/* Delete selected */
.deleteBtn{
  background:transparent;
  border:1px solid #ef4444 !important;
  color:#ef4444;
}

.deleteBtn:hover{
  background:#ef4444;
  color:white;
}

/* ALL BUTTON BASE FIX */
.table-controls button{
  padding:8px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:500;
  font-size:14px;
  transition:0.2s ease;
}

th:first-child,
td:first-child{
  width:70px;
  text-align:center;
}

    .switch {
      position: relative;
      width: 40px;
      height: 20px;
      display: inline-block;
    }

    .switch input { opacity:0; width:0; height:0; }

    .slider {
      position: absolute;
      background: #d1d5db;
      border-radius: 20px;
      top:0; left:0; right:0; bottom:0;
      transition: .2s;
    }

    .slider:before {
      content:"";
      height:16px; width:16px;
      background:white;
      border-radius:50%;
      position:absolute;
      left:2px; bottom:2px;
      transition:.2s;
    }

    input:checked + .slider { background:#2563eb; }
    input:checked + .slider:before { transform:translateX(20px); }

    #settingsSub {
      display: none;
      padding-left: 18px;
      padding-bottom: 10px;
      margin-top: 6px;
    }

    #settingsSub .sub-item {
      padding: 8px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

#settingsSub a {
  text-decoration: none;
  color: inherit;
}


#pcList li{
padding:8px 10px;
border-radius:6px;
margin-bottom:6px;
background:#f3f4f6;
}

body.dark #pcList li{
background:#1e293b;
}

#pcCodeInput{
width:100%;
max-width:220px;
}
  </style>
</head>

<body>

<div class="topbar">
  <img src="logo-white.png" width="50">
  <h2 style="margin-left:10px;">CampusLog</h2>
</div>

<div class="layout">

<nav class="sidebar">
<ul>
<li onclick="showPage('dashboard')">Dashboard</li>
<li onclick="showPage('table')">Entries / Table</li>
<li onclick="showPage('pc')">Add PC</li>
<li onclick="toggleSettingsMenu()">Settings ▼</li>

<div id="settingsSub">
<div class="sub-item">
<span>Dark Theme</span>
<label class="switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>
</div>

<div class="sub-item">
<a href="changepass.html">Change password</a>
</div>

<div class="sub-item" onclick="deleteAccount()">Delete account</div>
</div>

<li onclick="logout()">Logout</li>
</ul>
</nav>

<main class="content">

<section id="dashboardPage" class="page active">
<h2 id="welcome"></h2>

<div style="display:flex; gap:20px;">
<div class="card">
Today <span id="todayCount" style="font-size:28px;font-weight:700;">0</span>
</div>

<div class="card">
This Week <span id="weekCount" style="font-size:28px;font-weight:700;">0</span>
</div>

<div class="card">
This Month <span id="monthCount" style="font-size:28px;font-weight:700;">0</span>
</div>
</div>
</section>

<section id="tablePage" class="page">
<h2>Lab Entries</h2>

<div class="table-controls">
<input id="searchInput" placeholder="Search..." oninput="renderTable()">
<button class="exportBtn" onclick="exportCSV()">Export</button>
<button class="clearBtn" onclick="clearAll()">Clear All</button>
<button class="deleteBtn" id="deleteSelectedBtn" onclick="deleteSelected()" style="display:none;">Delete</button>
</div>

<table id="dataTable">
<thead>
<tr>
<th>Select</th>
<th onclick="sortTable(0)">Time</th>
<th onclick="sortTable(1)">Name</th>
<th onclick="sortTable(2)">Enrollment</th>
<th onclick="sortTable(3)">Branch</th>
<th onclick="sortTable(4)">Course</th>
<th onclick="sortTable(5)">PC</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</section>

<section id="pcPage" class="page">

<h2>Add PC</h2>

<div class="table-controls" style="max-width:420px;">
<input id="pcCodeInput" placeholder="Enter PC Code">
<button class="exportBtn" onclick="addPC()">Add PC</button>
<button onclick="addPC()">Add PC</button>
</div>

<h3 style="margin-top:20px;">Added PCs</h3>
<ul id="pcList"></ul>

</section>

</main>
</div>

<script>

const STORAGE_KEY="lab_entries";
let sortDirection={};

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id+"Page").classList.add("active");
}

function toggleSettingsMenu(){
const box=document.getElementById("settingsSub");
box.style.display=box.style.display==="block"?"none":"block";
}

function applyTheme(){
const isDark=localStorage.getItem("theme")==="dark";
document.body.classList.toggle("dark",isDark);
document.getElementById("themeToggle").checked=isDark;
}

document.getElementById("themeToggle").onclick=function(){
const dark=this.checked;
localStorage.setItem("theme",dark?"dark":"light");
applyTheme();
};

function getEntries(){
return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
}

function renderTable(){

fetch("/entries")
.then(res=>res.json())
.then(data=>{
const q=document.getElementById("searchInput").value.toLowerCase();

if(q){
data=data.filter(e =>
e.name.toLowerCase().includes(q) ||
e.branch.toLowerCase().includes(q) ||
e.course.toLowerCase().includes(q) ||
e.enroll.toLowerCase().includes(q) ||
e.pc.toLowerCase().includes(q)
);
}

const tbody=document.getElementById("tbody");
tbody.innerHTML="";

data.forEach(e=>{

let branchName = e.branch;

if(branchName==="btech") branchName="B.Tech";
if(branchName==="diploma") branchName="Diploma";
if(branchName==="pharmacy") branchName="Pharmacy";
if(branchName==="general") branchName="General";

tbody.innerHTML+=`
<tr>
<td><input type="checkbox" class="rowCheck" data-id="${e.time}" onchange="toggleDeleteBtn()"></td>
<td>${new Date(e.time).toLocaleString()}</td>
<td>${e.name}</td>
<td>${e.enroll}</td>
<td>${branchName}</td>
<td>${e.course}</td>
<td>${e.pc}</td>
</tr>`;
});

});
}

function sortTable(col){

const table=document.getElementById("dataTable");
let rows=Array.from(table.rows).slice(1);

sortDirection[col]=!sortDirection[col];

rows.sort((a,b)=>{

let x=a.cells[col].innerText.toLowerCase();
let y=b.cells[col].innerText.toLowerCase();

if(col===0){
return sortDirection[col]
? new Date(x)-new Date(y)
: new Date(y)-new Date(x);
}

if(x<y) return sortDirection[col]?-1:1;
if(x>y) return sortDirection[col]?1:-1;
return 0;

});

rows.forEach(r=>table.appendChild(r));
}

function logout(){
sessionStorage.removeItem("loggedIn");
window.location.href="login.html";
}

function deleteAccount(){
if(confirm("Delete admin account permanently?")){
localStorage.removeItem("adminUser");
localStorage.removeItem("adminPass");
localStorage.removeItem("adminName");
sessionStorage.removeItem("loggedIn");
alert("Account deleted.");
window.location.href="signup.html";
}
}

function animate(el,target){
let i=0;
let step=target/50;
let val=0;

let timer=setInterval(()=>{

val+=step;
i++;

if(i>=50){
val=target;
clearInterval(timer);
}

el.textContent=Math.round(val);

},20);

}

function loadStats(){

const data=getEntries();
const today=new Date().toLocaleDateString();

let todayCount=data.filter(d =>
new Date(d.time).toLocaleDateString()==today).length;

let now=new Date();

let weekStart=new Date(now);
weekStart.setDate(weekStart.getDate()-weekStart.getDay());
weekStart.setHours(0,0,0,0);

let weekCount=data.filter(d =>
new Date(d.time)>=weekStart).length;

let m=new Date().getMonth();
let y=new Date().getFullYear();

let monthCount=data.filter(d=>{
let dt=new Date(d.time);
return dt.getMonth()==m && dt.getFullYear()==y;
}).length;

animate(document.getElementById("todayCount"),todayCount);
animate(document.getElementById("weekCount"),weekCount);
animate(document.getElementById("monthCount"),monthCount);

}

/* ENTER KEY = NEXT INPUT FIELD */

document.addEventListener("DOMContentLoaded",function(){

const inputs=document.querySelectorAll("input");

inputs.forEach((input,index)=>{

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();

const nextInput=inputs[index+1];

if(nextInput){
nextInput.focus();
}

}

});

});

});

window.onload=()=>{

document.getElementById("welcome").textContent=
"Welcome, "+(localStorage.getItem("adminName")||"Admin");

applyTheme();
loadStats();
renderTable();
renderPCs();
};

function exportCSV(){

let data = getEntries();

let rows = [
["Time","Name","Enrollment","Branch","Course","PC"]
];

data.forEach(e=>{

let branch = e.branch;
if(branch==="btech") branch="B.Tech";
if(branch==="diploma") branch="Diploma";
if(branch==="pharmacy") branch="Pharmacy";
if(branch==="general") branch="General";

rows.push([
new Date(e.time).toLocaleString(),
e.name,
e.enroll,
branch,
e.course,
e.pc
]);

});

let csvContent = rows.map(r=>r.join("\t")).join("\n");

let blob = new Blob([csvContent], {type:"application/vnd.ms-excel"});
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "lab_entries.xls";
a.click();
}

function clearAll(){
  if(confirm("Clear all entries?")){
    localStorage.removeItem(STORAGE_KEY);
    renderTable();
  }
}

function toggleDeleteBtn(){
  let checks = document.querySelectorAll(".rowCheck:checked");
  document.getElementById("deleteSelectedBtn").style.display =
    checks.length ? "inline-block" : "none";
}

function deleteSelected(){

  if(!confirm("Delete selected entries?")) return;

  let checks = document.querySelectorAll(".rowCheck:checked");

  let ids = Array.from(checks).map(c => c.dataset.id);

  Promise.all(ids.map(id => fetch("/delete/"+id)))
  .then(()=>{
    renderTable();
    toggleDeleteBtn();
  });

}

function getPCs(){
return JSON.parse(localStorage.getItem("adminPCs")||"[]");
}

function addPC(){

let code=document.getElementById("pcCodeInput").value.trim();

if(!code){
alert("Enter PC Code");
return;
}

let pcs=getPCs();

if(pcs.includes(code)){
alert("Already added");
return;
}

pcs.push(code);

fetch("/add",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
time:new Date().toISOString(),
name:name,
enroll:enroll,
branch:branch,
course:course,
pc:pc
})
}).then(()=>{

alert("Entry saved");
renderTable();

});

document.getElementById("pcCodeInput").value="";
renderPCs();
}

function renderPCs(){

let pcs=getPCs();

let ul=document.getElementById("pcList");
ul.innerHTML="";

pcs.forEach(pc=>{
ul.innerHTML+=`<li>${pc}</li>`;
});
}

async function addPC() {
  const pcCode = document.getElementById("pcCodeInput").value;

  const res = await fetch("http://127.0.0.1:5000/api/add-pc", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ pcCode, accountId: "admin1" })
  });

  const data = await res.json();

  if (data.success) alert("PC Added ✅");
  else alert("Error ❌");
}
</script>

</body>
</html>
