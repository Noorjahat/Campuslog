<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CampusLog — Create Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #111827;
      --accent: #2563eb;
      --shadow: 0 6px 20px rgba(15,23,42,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root{
        --bg: #0b1220;
        --card: #0f1724;
        --text: #e6eef8;
        --accent: #60a5fa;
        --shadow: 0 8px 26px rgba(0,0,0,0.6);
      }
    }
    body.dark, html.dark { --bg: #0b1220; --card:#0f1724; --text:#e6eef8; --accent:#60a5fa; --shadow:0 8px 26px rgba(0,0,0,0.6); }
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Inter, sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }
    .card {
      background:var(--card);
      color:var(--text);
      padding:28px;
      width:360px;
      border-radius:12px;
      box-shadow:var(--shadow);
    }
    h2{margin:0 0 14px 0; text-align:center;}
    
    input{
  width:100%;
  padding:12px 14px;
  margin:12px 0;
  border-radius:8px;
  border:1px solid #d1d5db;
  background:white;
  color:#111827;
  font-size:14px;
  box-sizing:border-box;
  outline:none;
}

body.dark input{
  border:1px solid #334155;
  background:#0b1220;
  color:#e5e7eb;
}

    input:focus{
      border-color:#60a5fa;
      box-shadow:0 0 0 1px #60a5fa;
    }

    button{ width:100%; padding:12px; margin-top:10px; border-radius:8px; border:none; background:var(--accent); color:white; cursor:pointer; font-weight:600; }
    .msg { font-size:13px; color:#e11d48; text-align:center; display:none; margin-top:8px; }
    p.small { text-align:center; margin-top:12px; font-size:14px; opacity:0.9; }
    a { color:var(--accent); text-decoration:none; font-weight:600; }
    .pass-box{
  position:relative;
}

.pass-box input{
  padding-right:40px;
}

.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:16px;
  opacity:0.7;
}

.eye:hover{
  opacity:1;
}


</style>
</head>
<body>

  <div class="card">
    <h2>Create Admin Account</h2>

    <input id="name" placeholder="Full name" autocomplete="name">
    <input id="user" placeholder="Username" autocomplete="username">

    <div class="pass-box">
  <input id="pass" type="password" placeholder="Password" autocomplete="new-password">
  <span class="eye" onclick="togglePass('pass', this)">👁</span>
</div>

<div class="pass-box">
  <input id="pass2" type="password" placeholder="Confirm password" autocomplete="new-password">
  <span class="eye" onclick="togglePass('pass2', this)">👁</span>
</div>

    <button id="signupBtn">Signup</button>
    <div id="msg" class="msg"></div>

    <p class="small">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
document.getElementById("signupBtn").onclick=function(){

const name=document.getElementById("name").value.trim();
const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value;
const pass2=document.getElementById("pass2").value;
const msg=document.getElementById("msg");

if(!name||!user||!pass||!pass2){
msg.style.display="block";
msg.innerText="All fields required";
return;
}

if(pass!==pass2){
msg.style.display="block";
msg.innerText="Passwords not match";
return;
}

fetch("/signup",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({name,user,pass})
})
.then(res=>res.json())
.then(d=>{

if(d.status==="exists"){
msg.style.display="block";
msg.innerText="Username exists";
}else{
alert("Signup successful");
location.href="login.html";
}

});

};
</script>

<script>
const inputs = document.querySelectorAll("input");

inputs.forEach((input, index) => {
  input.addEventListener("keydown", function(e) {

    if (e.key === "Enter") {
      e.preventDefault();

      const nextInput = inputs[index + 1];

      if (nextInput) {
        nextInput.focus();   // next field
      } else {
        document.getElementById("signupBtn").click(); // last pe signup
      }

    }

  });
});
</script>

<script>
function togglePass(id, el){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    el.textContent = "🙈";
  } else {
    input.type = "password";
    el.textContent = "👁";
  }
}
</script>

<script>
(function(){
let isDark = localStorage.getItem("theme")==="dark";
document.body.classList.toggle("dark",isDark);
})();
</script>

</body>
</html>
